<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Candidate to HR - Wireframe Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding: 40px;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .browser-screen {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            width: 600px;
        }
        .browser-header {
            background: #f9fafb;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .modal-container {
            padding: 32px;
        }

        .candidate-summary {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            background-color: #f1f5f9;
        }

        input[type="radio"]:checked + .radio-label-container {
            color: #2563eb;
        }

        @media print {
            body { background: white; padding: 0; }
            .browser-screen { box-shadow: none; border: 1px solid #e5e7eb; }
            .browser-header { display: none; }
        }
    </style>
</head>
<body>

<div class="browser-screen">
    <!-- Browser Mockup Header -->
    <div class="browser-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div class="ml-4 text-xs text-gray-400 font-mono">https://recruitment.software/hr-referral</div>
    </div>

    <!-- Modal Content -->
    <div class="modal-container">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Send Candidate to HR</h1>

        <!-- Candidate Summary Section -->
        <div class="candidate-summary">
            <div class="grid grid-cols-2 gap-y-4 gap-x-6">
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Candidate</div>
                    <div class="text-base font-bold text-slate-900">Ahmed Khan</div>
                </div>
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Applied Job</div>
                    <div class="text-sm font-medium text-slate-700">Software Engineer</div>
                </div>
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Interview Status</div>
                    <div class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">
                        Completed
                    </div>
                </div>
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Assessment</div>
                    <div class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">
                        Submitted
                    </div>
                </div>
            </div>
        </div>

        <!-- Manager Decision Section -->
        <div class="mb-8">
            <label class="block text-sm font-semibold text-slate-700 mb-4">Manager Decision:</label>
            <div class="space-y-3">
                <label class="radio-option group">
                    <input type="radio" name="decision" value="recommended" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                    <span class="ml-3 text-sm font-medium text-slate-700 group-hover:text-slate-900">Recommended</span>
                </label>
                <label class="radio-option group">
                    <input type="radio" name="decision" value="not_recommended" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                    <span class="ml-3 text-sm font-medium text-slate-700 group-hover:text-slate-900">Not Recommended</span>
                </label>
                <label class="radio-option group">
                    <input type="radio" name="decision" value="hold" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                    <span class="ml-3 text-sm font-medium text-slate-700 group-hover:text-slate-900">Keep on Hold</span>
                </label>
            </div>
        </div>

        <!-- Remarks Section -->
        <div class="mb-8">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Remarks to HR:</label>
            <textarea rows="4" class="w-full p-3 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400" placeholder="Enter your final evaluation and notes for the HR team..."></textarea>
        </div>

        <!-- Footer Actions -->
        <div class="flex justify-end gap-3 pt-6 border-t border-slate-100">
            <button class="px-6 py-2 border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-colors">Cancel</button>
            <button class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-all shadow-sm hover:shadow-md active:scale-95">Send to HR</button>
        </div>
    </div>
</div>

</body>
</html>
