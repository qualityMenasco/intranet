<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Interviewer - Wireframe Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            padding: 40px;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .browser-screen {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #e5e7eb;
            width: 600px;
        }
        .browser-header {
            background: #f9fafb;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .modal-container {
            padding: 32px;
        }

        .candidate-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .radio-group label:hover {
            background-color: #f3f4f6;
        }

        .radio-group input:checked + div {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        @media print {
            body { background: white; padding: 0; }
            .browser-screen { box-shadow: none; border: 1px solid #e5e7eb; }
            .browser-header { display: none; }
        }
    </style>
</head>
<body>

<div class="browser-screen">
    <!-- Browser Mockup Header -->
    <div class="browser-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <div class="ml-4 text-xs text-gray-400 font-mono">https://recruitment.software/assign-interviewer</div>
    </div>

    <!-- Modal Content -->
    <div class="modal-container">
        <h1 class="text-2xl font-bold text-gray-900 mb-6">Assign Interviewer</h1>

        <!-- Candidate Section -->
        <div class="candidate-card">
            <div class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Candidate</div>
            <div class="text-xl font-bold text-gray-900">Ahmed Khan</div>
            <div class="flex gap-4 mt-2 text-sm text-gray-600">
                <div><span class="font-medium text-gray-900">Applied Job:</span> Software Engineer</div>
                <div><span class="font-medium text-gray-900">Department:</span> IT</div>
            </div>
        </div>

        <!-- Selection Section -->
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3">Select interviewer type:</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="relative flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="radio" name="interviewer_type" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300" checked>
                        <span class="ml-3 text-sm font-medium text-gray-900">Myself</span>
                    </label>
                    <label class="relative flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50">
                        <input type="radio" name="interviewer_type" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300">
                        <span class="ml-3 text-sm font-medium text-gray-900">Team Member</span>
                    </label>
                </div>
            </div>

            <!-- Team Member Dropdown -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Team Member</label>
                <select class="w-full p-2.5 border border-gray-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <option disabled selected>Select a team member</option>
                    <option>Ali Raza</option>
                    <option>Bilal Khan</option>
                    <option>John Mathew</option>
                </select>
            </div>

            <!-- Optional Notes -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Optional Notes</label>
                <textarea rows="3" class="w-full p-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Add any specific instructions or notes for the interviewer..."></textarea>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button class="px-6 py-2 border border-gray-300 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">Cancel</button>
                <button class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors shadow-sm">Assign</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
