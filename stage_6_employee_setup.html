<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 6: Employee Setup & Finalization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding: 40px; color: #111827; }
        .browser-screen { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; max-width: 1000px; margin: 0 auto; }
        .browser-header { background: #f9fafb; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        .section-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 24px; background: white; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; }
        .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-purple { background-color: #f5f3ff; color: #5b21b6; }
    </style>
</head>
<body>
<div class="browser-screen">
    <div class="browser-header">
        <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
        <div class="ml-4 text-xs text-gray-400 font-mono">https://recruitment.software/hr/employee-setup/ahmed-khan</div>
    </div>
    <div class="p-8">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Stage 6: Employee Setup & Finalization</h1>
        </div>

        <div class="bg-slate-900 text-white rounded-xl p-6 mb-8 shadow-lg">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Candidate Name</label><div class="text-lg font-bold">Ahmed Khan</div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Visa Status</label><div><span class="status-badge badge-purple">Visa Issued</span></div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Documents</label><div class="text-sm font-bold text-green-400">Verified</div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Hiring Status</label><div class="text-sm font-bold text-blue-400">Ready to Hire</div></div>
            </div>
        </div>

        <div class="section-card border-blue-200 bg-blue-50/20">
            <div class="section-title text-blue-600">Section 5: Final Step - Employee Setup</div>
            <p class="text-sm text-blue-600 mb-8 font-medium italic">"Please enter the Employee ID and Joining Date to officially complete the hiring process."</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Employee ID <span class="text-red-500">*</span></label>
                    <input type="text" class="w-full p-3 border border-blue-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-blue-500 outline-none" placeholder="EMP-10245">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Joining Date <span class="text-red-500">*</span></label>
                    <input type="date" class="w-full p-3 border border-blue-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="pt-8 border-t border-blue-100 flex justify-end gap-4">
                <button class="px-8 py-3 border border-gray-300 rounded-lg font-bold text-gray-700 hover:bg-gray-50 transition-colors">Save Draft</button>
                <button class="px-10 py-3 bg-green-600 text-white rounded-lg font-bold shadow-lg hover:bg-green-700 transition-all hover:scale-105">Complete Finalization & Hire</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
