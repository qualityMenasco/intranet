<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4.6: Visa Application Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding: 40px; color: #111827; }
        .browser-screen { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; max-width: 1000px; margin: 0 auto; }
        .browser-header { background: #f9fafb; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        .section-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 24px; background: white; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; }
        .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-yellow { background-color: #fefce8; color: #854d0e; }
    </style>
</head>
<body>
<div class="browser-screen">
    <div class="browser-header">
        <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
        <div class="ml-4 text-xs text-gray-400 font-mono">https://recruitment.software/hr/visa-tracking/ahmed-khan</div>
    </div>
    <div class="p-8">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Stage 4.6: Visa Application Tracking</h1>
            <p class="text-gray-500 mt-2">Initiate and monitor the external visa application status.</p>
        </div>

        <div class="bg-slate-900 text-white rounded-xl p-6 mb-8 shadow-lg">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Candidate Name</label><div class="text-lg font-bold">Ahmed Khan</div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Visa Status</label><div><span class="status-badge badge-yellow">Applied / In Process</span></div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Document Verification</label><div class="text-sm font-bold text-green-400">Complete</div></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Visa Application Details</div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">MOFA Submission Ref No</label>
                    <input type="text" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="MOFA-98234-X">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Submission Date</label>
                    <input type="date" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="2026-03-31">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Current Stage</label>
                    <select class="w-full p-2.5 border border-gray-300 rounded-lg bg-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>Security Clearance</option>
                        <option selected>Work Permit Approval</option>
                        <option>Entry Permit Issuance</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Estimated Completion</label>
                    <input type="date" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="2026-04-15">
                </div>
            </div>
            <div class="text-right">
                <button class="bg-blue-600 text-white font-bold px-10 py-2.5 rounded-lg text-sm shadow-md hover:bg-blue-700 transition-colors">Update Tracking Status</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
