<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 4.7: Visa Copy Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; padding: 40px; color: #111827; }
        .browser-screen { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e5e7eb; max-width: 1000px; margin: 0 auto; }
        .browser-header { background: #f9fafb; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        .section-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 24px; background: white; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; border-bottom: 1px solid #f3f4f6; padding-bottom: 8px; }
        .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-purple { background-color: #f5f3ff; color: #5b21b6; }
    </style>
</head>
<body>
<div class="browser-screen">
    <div class="browser-header">
        <div class="dot dot-red"></div><div class="dot dot-yellow"></div><div class="dot dot-green"></div>
        <div class="ml-4 text-xs text-gray-400 font-mono">https://recruitment.software/hr/visa-upload/ahmed-khan</div>
    </div>
    <div class="p-8">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Stage 4.7: Visa Copy Upload</h1>
            <p class="text-gray-500 mt-2">Upload the final issued visa copy and finalize details.</p>
        </div>

        <div class="bg-slate-900 text-white rounded-xl p-6 mb-8 shadow-lg">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Candidate Name</label><div class="text-lg font-bold">Ahmed Khan</div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Visa Status</label><div><span class="status-badge badge-purple">Visa Issued</span></div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Visa Type</label><div class="text-sm font-bold text-green-400">Employment Visa</div></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Upload Final Visa Document</div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Final Visa Number</label>
                    <input type="text" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-900" value="VISA-UAE-9872345">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Expiry Date</label>
                    <input type="date" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-900" value="2028-03-30">
                </div>
            </div>
            <div class="border-2 border-dashed border-gray-200 rounded-xl p-10 text-center bg-gray-50">
                <div class="mb-4">
                    <svg class="w-12 h-12 text-gray-400 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <div class="text-sm font-bold text-gray-700 mb-2">Upload Issued Visa Copy (PDF/JPG)</div>
                <div class="flex justify-center gap-4">
                    <input type="file" class="hidden" id="visa_upload">
                    <button onclick="document.getElementById('visa_upload').click()" class="bg-blue-600 text-white px-8 py-2.5 rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 transition-colors">Select Visa File</button>
                </div>
                <p class="text-xs text-gray-400 mt-4">Max file size: 5MB</p>
            </div>
            <div class="mt-8 text-right">
                <button class="bg-green-600 text-white font-bold px-12 py-3 rounded-lg text-sm shadow-md hover:bg-green-700 transition-colors">Finalize Visa Upload</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
